name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_OAUTH_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Debug – Print secret length
        run: |
          echo "Length of secret:"
          echo -n "${{ secrets.CODESTAR_CONNECTION_ARN }}" | wc -c

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      # ---------------------------------------------------------
      # PRINT THE GITHUB SECRET (MASKED)
      # ---------------------------------------------------------
      - name: Debug – Print GitHub Secret ARN (masked)
        env:
          CODESTAR_CONNECTION_ARN: ${{ secrets.CODESTAR_CONNECTION_ARN }}
        run: |
          echo "GitHub Secret ARN (masked):"
          echo "$CODESTAR_CONNECTION_ARN"

      # ---------------------------------------------------------
      # PRINT THE REAL ARN TERRAFORM IS USING (UNMASKED, NON-BLOCKING)
      # ---------------------------------------------------------
      - name: Debug – Print Terraform variable ARN (unmasked)
        run: |
          echo "Terraform sees this ARN:"
          terraform plan -no-color \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="codestar_connection_arn=${{ secrets.CODESTAR_CONNECTION_ARN }}" \
            | grep codestar_connection_arn || true

      # ---------------------------------------------------------
      # TERRAFORM PLAN
      # ---------------------------------------------------------
      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="codestar_connection_arn=${{ secrets.CODESTAR_CONNECTION_ARN }}"

      # ---------------------------------------------------------
      # TERRAFORM APPLY
      # ---------------------------------------------------------
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Start CodeBuild
        run: |
          aws codebuild start-build --project-name homecredit-batch-pipeline
