name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_OAUTH_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      # 🔹 Debug: Print full CodeStar connection ARN
      - name: Debug full CodeStar ARN
        run: echo "Using CodeStar connection ARN: $CODESTAR_CONNECTION_ARN"
        env:
          CODESTAR_CONNECTION_ARN: ${{ secrets.CODESTAR_CONNECTION_ARN }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="codestar_connection_arn=${{ secrets.CODESTAR_CONNECTION_ARN }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan