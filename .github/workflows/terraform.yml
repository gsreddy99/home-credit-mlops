name: Terraform Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_OAUTH_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=infra init

      - name: Terraform Apply
        run: |
          terraform -chdir=infra apply -auto-approve \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="github_oauth_token=${{ secrets.GH_OAUTH_TOKEN }}"

      # ⭐ CRITICAL FIX: Copy state file into repo before committing
      - name: Copy Terraform state into repo
        run: |
          cp infra/terraform.tfstate ./infra/terraform.tfstate || true
          cp infra/terraform.tfstate.backup ./infra/terraform.tfstate.backup || true

      - name: Commit Terraform state
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add infra/terraform.tfstate infra/terraform.tfstate.backup || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Terraform state [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_OAUTH_TOKEN }}
