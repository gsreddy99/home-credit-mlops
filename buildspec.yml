version: 0.2

phases:
  install:
    commands:
      - pip install --upgrade pip
      - pip install "sagemaker==2.218.0" boto3 pandas polars joblib scikit-learn pytz

  pre_build:
    commands:
      - echo "Environment:"
      - python --version
      - pip show sagemaker

  build:
    commands:
      - echo "Updating SageMaker Pipeline..."
      - python src/pipeline.py --update
      - echo "Running SageMaker Pipeline..."
      - python src/pipeline.py --run

artifacts:
  files:
    - '**/*'
