version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11   # explicit is good
    commands:
      - pip install --upgrade pip
      - pip install "sagemaker==2.218.0" boto3 pandas joblib pytz polars lightgbm scikit-learn

  build:
    commands:
      - echo "Updating SageMaker pipeline..."
      - python src/pipeline.py --update
      - echo "Running SageMaker pipeline..."
      - python src/pipeline.py --run
