version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip install -U "sagemaker>=2.230.0" boto3  # force latest/recent
      # remove pinned old version if any
      # keep other installs: pandas joblib etc. if needed
  build:
    commands:
      - echo "SDK version:"
      - pip show sagemaker | grep Version   # log it for visibility
      - python src/pipeline.py --update
      - python src/pipeline.py --run