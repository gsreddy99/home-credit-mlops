version: 0.2

phases:
  install:
    commands:
      - echo "Upgrading pip and installing SageMaker SDK..."
      - pip install --upgrade pip
      - pip install --upgrade "sagemaker>=2.200.0" boto3 scikit-learn

  pre_build:
    commands:
      - echo "Environment:"
      - python --version
      - pip show sagemaker
      - echo "SAGEMAKER_ROLE_ARN=$SAGEMAKER_ROLE_ARN"
      - echo "BUCKET=$BUCKET"
      - echo "AWS_REGION=$AWS_REGION"

  build:
    commands:
      - echo "Updating SageMaker Pipeline definition..."
      - python src/pipeline.py --update
      - echo "Starting SageMaker Pipeline execution..."
      - python src/pipeline.py --run

artifacts:
  files:
    - '**/*'
