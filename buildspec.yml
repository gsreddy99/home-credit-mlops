# filename: buildspec.yml
version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip uninstall -y sagemaker || true
      # Include lightgbm here so the pipeline script doesn't fail on local imports
      - pip install "sagemaker<3.0.0" boto3 pytz pandas polars joblib scikit-learn lightgbm
  build:
    commands:
      - echo "Updating and Running Pipeline..."
      - python src/pipeline.py --update
      - python src/pipeline.py --run